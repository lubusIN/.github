name: Prepare Build
description: Checkout repository, install dependencies, and run build when available.

inputs:
  checkout-ref:
    description: Git ref to checkout.
    required: false
    default: ""
  fetch-depth:
    description: Checkout fetch depth.
    required: false
    default: "0"
  run-build:
    description: Run npm build when package.json has a build script.
    required: false
    default: "true"
  setup-wp-cli:
    description: Setup PHP with WP-CLI and install wp-cli/dist-archive-command via Composer.
    required: false
    default: "false"
  php-version:
    description: PHP version to setup when setup-wp-cli is true.
    required: false
    default: "8.2"

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.checkout-ref != '' && inputs.checkout-ref || github.sha }}
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Setup PHP with WP-CLI and Composer
      if: inputs.setup-wp-cli == 'true'
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        coverage: none
        tools: composer, wp-cli

    - name: Install dist-archive command via Composer
      if: inputs.setup-wp-cli == 'true'
      shell: bash
      run: |
        mkdir -p ~/.wp-cli/packages
        if [ ! -f ~/.wp-cli/packages/composer.json ]; then
          echo '{"minimum-stability":"dev","prefer-stable":true}' > ~/.wp-cli/packages/composer.json
        fi
        composer --working-dir=$HOME/.wp-cli/packages require wp-cli/dist-archive-command:v3.1.0 --no-interaction

    - name: Set up Node.js
      if: hashFiles('package.json') != ''
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      shell: bash
      run: |
        if [ -f "composer.json" ]; then
          if [ ! -d "vendor" ]; then
            echo "No vendor directory found. Running composer install..."
            composer install --no-dev --no-interaction --prefer-dist
          else
            echo "Vendor directory already exists. Skipping composer install."
          fi
        fi

        if [ -f "package.json" ]; then
          npm ci
        fi

    - name: Build project
      if: inputs.run-build == 'true'
      shell: bash
      run: |
        if [ -f "package.json" ] && npm run | grep -q "build"; then
          npm run build
        fi