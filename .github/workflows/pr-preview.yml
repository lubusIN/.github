name: Reusable WordPress Playground Preview

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_BUILD_BRANCH: playground-${{ github.event.pull_request.number }}
  PR_BUILD_ZIP: pr-build-${{ github.event.pull_request.number }}.zip
  GIT_USER_NAME: "GitHub Action"
  GIT_USER_EMAIL: "action@github.com"
  STORAGE_METHOD: ${{ github.event.repository.private == true && 'r2' || 'branch' }}
  CLOUDFLARE_R2_BUCKET_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_BUCKET_PUBLIC_URL }}

jobs:
  build-and-preview:
    if: github.event.action != 'closed'
    name: Build and Generate Playground Preview
    runs-on: ubuntu-latest

    steps:
      - name: Prepare build
        uses: lubusIN/.github/.github/actions/prepare-build@main
        with:
          checkout-ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Log detected repository type and storage method
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Is Private: ${{ github.event.repository.private }}"
          echo "Storage Method: ${{ env.STORAGE_METHOD }}"

      - name: Setup branch storage
        if: env.STORAGE_METHOD == 'branch'
        uses: lubusIN/.github/.github/actions/publish-build-branch@main
        with:
          target-branch: ${{ env.PR_BUILD_BRANCH }}
          paths: |
            build
            vendor
          commit-message: Add build files for playground preview
          git-user-name: ${{ env.GIT_USER_NAME }}
          git-user-email: ${{ env.GIT_USER_EMAIL }}

      - name: Setup R2 storage
        if: env.STORAGE_METHOD == 'r2'
        run: |
          zip -r "$PR_BUILD_ZIP" . -x "node_modules/*" ".git/*" ".github/*"
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto
          aws configure set default.output json
        env:
          AWS_EC2_METADATA_DISABLED: true

      - name: Upload to R2
        if: env.STORAGE_METHOD == 'r2'
        run: |
          ENDPOINT="https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="${{ secrets.CLOUDFLARE_R2_BUCKET }}"
          if aws s3api head-object --bucket "$BUCKET" --key "$PR_BUILD_ZIP" --endpoint-url "$ENDPOINT" 2>/dev/null; then
            echo "File exists. Deleting..."
            aws s3 rm "s3://$BUCKET/$PR_BUILD_ZIP" --endpoint-url "$ENDPOINT"
          fi
          aws s3 cp "$PR_BUILD_ZIP" "s3://$BUCKET/$PR_BUILD_ZIP" --endpoint-url "$ENDPOINT"

      - name: Post or update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const storageMethod = process.env.STORAGE_METHOD;
            let zipUrl, commentMarker, storageTitle;
            if (storageMethod === 'r2') {
              const bucketPublicUrl = process.env.CLOUDFLARE_R2_BUCKET_PUBLIC_URL;
              const zipFile = `pr-build-${prNumber}.zip`;
              zipUrl = `${bucketPublicUrl}/${zipFile}`;
              commentMarker = "<!-- WordPress Playground PR Preview - Cloudflare R2 -->";
              storageTitle = "Preview via Cloudflare R2 Storage";
            } else {
              const branch = `playground-${prNumber}`;
              zipUrl = `https://github-proxy.com/proxy/?repo=${owner}/${repo}&branch=${branch}`;
              commentMarker = "<!-- WordPress Playground PR Preview - Build Branch -->";
              storageTitle = "Preview via GitHub Build Branch";
            }
            const blueprint = {
              "$schema": "https://playground.wordpress.net/blueprint-schema.json",
              "landingPage": "/wp-admin/post.php?post=4&action=edit",
              "login": true,
              "features": { "networking": true },
              "steps": [
                {
                  "step": "updateUserMeta",
                  "meta": {
                    "admin_color": "modern",
                    "show_welcome_panel": 0
                  },
                  "userId": 1
                },
                {
                  "step": "setSiteOptions",
                  "options": { "blogname": `${owner}/${repo} - PR ${prNumber}` }
                },
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "url",
                    "url": zipUrl
                  }
                },
                {
                  "step": "importWxr",
                  "file": {
                    "resource": "url",
                    "url": "https://raw.githubusercontent.com/lubusIN/blablablocks-slider-block/playground/_playground/demo-content.xml"
                  }
                }
              ]
            };
            const encoded = Buffer.from(JSON.stringify(blueprint)).toString('base64');
            const previewUrl = `https://playground.wordpress.net/#${encoded}`;
            const commentBody = `
              ${commentMarker}
              ### ${storageTitle}
              ⚡️WordPress Playground [Preview](${previewUrl})
              🚀 Build zip file [Download](${zipUrl})
              I will update this comment with the latest preview links as you push more changes to this PR.
              > [!NOTE]
              > The preview sites are created using [WordPress Playground](https://wordpress.org/playground/). You can add content, edit settings, and test the pull request as you would on a real site, but please note that changes are not saved between sessions.
            `;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c =>
              c.body.includes("<!-- WordPress Playground PR Preview") &&
              c.user.type === 'Bot'
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    name: Cleanup Preview Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup branch storage
        if: env.STORAGE_METHOD == 'branch'
        uses: lubusIN/.github/.github/actions/delete-remote-branch@main
        with:
          target-branch: ${{ env.PR_BUILD_BRANCH }}

      - name: Cleanup R2 storage
        if: env.STORAGE_METHOD == 'r2'
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto
          aws configure set default.output json
          ENDPOINT="https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="${{ secrets.CLOUDFLARE_R2_BUCKET }}"
          if aws s3api head-object --bucket "$BUCKET" --key "$PR_BUILD_ZIP" --endpoint-url "$ENDPOINT" 2>/dev/null; then
            echo "File exists. Deleting..."
            aws s3 rm "s3://$BUCKET/$PR_BUILD_ZIP" --endpoint-url "$ENDPOINT"
          else
            echo "File does not exist. Nothing to clean up."
          fi
        env:
          AWS_EC2_METADATA_DISABLED: true
