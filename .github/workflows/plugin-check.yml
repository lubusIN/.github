name: Reusable Plugin Check

on:
  workflow_call:

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare build
        uses: lubusIN/.github/.github/actions/prepare-build@main
        with:
          checkout-ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest
          coverage: none

      - name: Install WP-CLI
        run: |
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Install dist-archive command
        run: wp package install wp-cli/dist-archive-command:@stable

      - name: Build plugin from .distignore
        run: |
          wp dist-archive . ./plugin-check-build.zip
          mkdir -p tmp-build
          unzip -q plugin-check-build.zip -d tmp-build

          archive_dirs=(tmp-build/*/)
          if [ "${#archive_dirs[@]}" -ne 1 ]; then
            echo "Expected exactly one plugin directory in archive output."
            exit 1
          fi

          mv "${archive_dirs[0]%/}" tmp-build/plugin

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./tmp-build/plugin
