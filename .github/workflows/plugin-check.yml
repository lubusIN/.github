name: Reusable Plugin Check

on:
  workflow_call:
    inputs:
      plugin-slug:
        description: Plugin slug used for Plugin Check build directory
        required: false
        type: string

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare build
        uses: lubusIN/.github/.github/actions/prepare-build@main
        with:
          checkout-ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup PHP with WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest
          coverage: none
          tools: wp-cli

      - name: Install dist-archive command
        run: wp package install wp-cli/dist-archive-command:v3.1.0

      - name: Build plugin from .distignore
        run: |
          wp dist-archive . ./plugin-check-build.zip
          mkdir -p tmp-build
          unzip -q plugin-check-build.zip -d tmp-build

          archive_dirs=(tmp-build/*/)
          if [ "${#archive_dirs[@]}" -ne 1 ]; then
            echo "Expected exactly one plugin directory in archive output."
            exit 1
          fi

          extracted_dir="${archive_dirs[0]%/}"
          plugin_slug="${{ inputs.plugin-slug }}"

          if [ -z "$plugin_slug" ]; then
            plugin_slug="$(basename "$extracted_dir")"
          fi

          build_dir="tmp-build/$plugin_slug"
          mv "$extracted_dir" "$build_dir"
          echo "PLUGIN_BUILD_DIR=./$build_dir" >> "$GITHUB_ENV"

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ${{ env.PLUGIN_BUILD_DIR }}
